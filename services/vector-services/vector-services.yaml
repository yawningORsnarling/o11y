  o11y-internal-metrics-transform:
    type: remap
    inputs:
      - o11y-internal-metrics
    source: |
      .tags.stack = "o11y-home"

sinks:
  o11y-services-loki-local:
    type: loki
    inputs:
      - o11y-services-raw
      # - o11y-transform
    endpoint: "http://loki:3001"
    compression: snappy
    encoding:
      codec: "json"
    remove_label_fields: true
    remove_structured_metadata_fields: true

    labels:
      "*": "{{ labels }}"
    structured_metadata:
      "*": "{{ structured_metadata }}"

  o11y-vmagent-proxy-remote-write:
    type: prometheus_remote_write
    inputs:
      - o11y-internal-metrics-transform
    endpoint: "http://victoria-metrics:8428/api/v1/write"
