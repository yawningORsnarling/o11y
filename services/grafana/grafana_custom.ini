[auth.anonymous]
# enable anonymous access
enabled = true

# specify organization name that should be used for unauthenticated users
#org_name = Main Org.
#org_role = Editor

[security]
admin_user = "${GF_SECURITY_ADMIN_USER}"
admin_password = "${GF_SECURITY_ADMIN_PASSWORD}"

[panels]
disable_sanitize_html = true

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/welcome.json

[log]
# "trace", "debug", "info", "warn", "error", "critical", default is "info"
level = warn
