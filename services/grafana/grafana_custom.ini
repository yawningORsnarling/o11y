[auth.anonymous]
# enable anonymous access
enabled = true

# specify organization name that should be used for unauthenticated users
#org_name = Main Org.
#org_role = Editor

[security]
#admin_user = ""
#admin_password = ""

[panels]
disable_sanitize_html = true

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/welcome.json

[log]
# "trace", "debug", "info", "warn", "error", "critical", default is "info"
level = warn
