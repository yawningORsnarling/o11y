
- job_name: victoria-metrics
  scrape_interval: 1m
  scrape_timeout: 20s
  metrics_path: /metrics
  scheme: http
  static_configs:
    - targets:
        - "victoria-metrics:8428"
  relabel_configs:
    - target_label: stack
      replacement: o11y-home

