- job_name: pve
  scrape_interval: 1m
  scrape_timeout: 20s
  static_configs:
    - targets:
        - "10.10.10.100"  # o11y node
  metrics_path: /pve
  params:
    module: [default]
  relabel_configs:
    - target_label: stack
      replacement: o11y-home
    - source_labels: [__address__]
      target_label: __param_target
    - source_labels: [__param_target]
      target_label: instance
    - target_label: __address__
      replacement: pve-exporter:9221

